<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fyers Token Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        .login-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #007bff;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #ff5722; /* Fyers Theme Color */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-login:hover {
            background-color: #e64a19;
        }
        /* Message Box for Auth Code / Token */
        #result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 5px solid #4caf50;
            border-radius: 4px;
            word-wrap: break-word;
        }
        .code-text {
            font-family: monospace;
            color: #333;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Fyers Auto-Login Setup</h2>
        
        <div id="login-form">
            <div class="input-group">
                <label for="clientId">Client ID (App ID)</label>
                <input type="text" id="clientId" placeholder="e.g., XXXXXX-100" required>
            </div>
            
            <div class="input-group">
                <label for="secretKey">Secret Key</label>
                <input type="password" id="secretKey" placeholder="Enter your Secret Key" required>
            </div>

            <div class="input-group">
                <label for="redirectUri">Redirect URI</label>
                <input type="text" id="redirectUri" value="http://localhost:5500/accessToken.html" required>
            </div>

            <button class="btn-login" onclick="initiateFyersLogin()">Login with Fyers</button>
        </div>

        <div id="result-box">
            <p><strong>Auth Code Received!</strong></p>
            <p class="code-text" id="auth-code-display"></p>
            <br>
            <p style="font-size: 12px; color: #555;">Next Step: Send this code to Python Backend to get the final Access Token.</p>
        </div>
    </div>

    <script>
       // SHA-256 Hashing Function (Fyers ki strict security ke liye)
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // STEP 1: Jab user 'Login with Fyers' button dabata hai
        function initiateFyersLogin() {
            const clientId = document.getElementById('clientId').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();
            const redirectUri = document.getElementById('redirectUri').value.trim();
            
            if(!clientId || !secretKey || !redirectUri) {
                alert("Please enter Client ID, Secret Key, and Redirect URI.");
                return;
            }

            // Data ko browser ki memory (localStorage) mein save karna taaki wapas aane par yaad rahe
            localStorage.setItem('fyers_client_id', clientId);
            localStorage.setItem('fyers_secret_key', secretKey);

            const fyersAuthUrl = `https://api-t1.fyers.in/api/v3/generate-authcode?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&state=dashboard_login`;
            window.location.href = fyersAuthUrl;
        }

        // STEP 2: Page load hone par Auth Code ko Access Token mein badalna
        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('auth_code');

            if (authCode) {
                document.getElementById('login-form').style.display = 'none';
                const resultBox = document.getElementById('result-box');
                
                // Loading UI dikhana
                resultBox.style.display = 'block';
                resultBox.innerHTML = `<p><strong>Processing...</strong> Fetching Final Access Token...</p>`;

                // Memory se ID aur Secret wapas nikalna
                const clientId = localStorage.getItem('fyers_client_id');
                const secretKey = localStorage.getItem('fyers_secret_key');

                if (!clientId || !secretKey) {
                    resultBox.innerHTML = `<p style="color:red;">Error: Client ID or Secret missing. Please try login again.</p>`;
                    return;
                }

                try {
                    // Fyers ka formula: appIdHash = SHA256(clientId : secretKey)
                    const appIdHash = await sha256(clientId + ":" + secretKey);

                    // API call to get Access Token
                    const response = await fetch('https://api-t1.fyers.in/api/v3/validate-authcode', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            "grant_type": "authorization_code",
                            "appIdHash": appIdHash,
                            "code": authCode
                        })
                    });

                    const data = await response.json();

                    if (data.s === "ok") {
                        // SUCCESS! Final Access Token mil gaya
                        resultBox.style.borderLeftColor = '#4caf50';
                        resultBox.style.backgroundColor = '#e8f5e9';
                        resultBox.innerHTML = `
                            <p style="color: #2e7d32; font-size: 18px;"><strong>🎉 Success! Access Token Generated</strong></p>
                            <br>
                            <p><strong>Your Access Token:</strong></p>
                            <textarea style="width:100%; height:120px; margin-top:10px; padding:10px; font-family:monospace; border:1px solid #4caf50; border-radius:5px;" readonly id="finalTokenBox">${data.access_token}</textarea>
                            <button class="btn-login" style="margin-top: 15px; background-color: #4caf50;" onclick="copyToken()">Copy Token</button>
                            <br><br>
                            <a href="accessToken.html" style="color: #007bff; text-decoration: none; font-size: 14px;">← Generate New Token</a>
                        `;
                    } else {
                        // API ne token dene se mana kar diya (galat secret key ya expire ho gaya auth_code)
                        resultBox.style.borderLeftColor = '#f44336';
                        resultBox.style.backgroundColor = '#ffebee';
                        resultBox.innerHTML = `<p style="color: red;"><strong>Token Error:</strong> ${data.message}</p>
                        <button class="btn-login" style="margin-top: 15px;" onclick="window.location.href='accessToken.html'">Try Again</button>`;
                    }

                } catch (error) {
                    resultBox.innerHTML = `<p style="color:red;"><strong>System Error:</strong> ${error.message}</p>`;
                }
            }
        };

        // Token Copy karne ka chota sa function
        function copyToken() {
            const copyText = document.getElementById("finalTokenBox");
            copyText.select();
            document.execCommand("copy");
            alert("Access Token copied to clipboard!");
        }
    </script>
</body>
</html>
